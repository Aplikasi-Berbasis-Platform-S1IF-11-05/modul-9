<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Profil Pengguna</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;

    /* beda warna total */
    background: linear-gradient(135deg, #1d2b64, #f8cdda);
}

.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 30px;
    width: 360px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    color: white;
}

h2 {
    margin-bottom: 20px;
}

button {
    background: white;
    color: #333;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #eee;
    transform: scale(1.05);
}

.card {
    background: rgba(255,255,255,0.3);
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    text-align: left;
    animation: fadeUp 0.5s ease;
}

.card span {
    display: block;
    margin-bottom: 5px;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h2>👤 Profil Pengguna</h2>
    <button onclick="ambilData()">✨ Tampilkan Data</button>

    <div id="hasil"></div>
</div>

<script>
function ambilData() {
    fetch('data.php')
    .then(res => res.json())
    .then(data => {
        let output = '';

        data.forEach(item => {
            output += `
                <div class="card">
                    <span>👤 ${item.nama}</span>
                    <span>💼 ${item.pekerjaan}</span>
                    <span>📍 ${item.lokasi}</span>
                </div>
            `;
        });

        document.getElementById('hasil').innerHTML = output;
    });
}
</script>

</body>
</html>
