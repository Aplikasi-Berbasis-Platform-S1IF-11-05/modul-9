<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Profil Saya - AJAX Modern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        h2 {
            text-align: center;
            color: white;
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .btn-profile {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .btn-profile:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            filter: brightness(1.05);
        }

        .btn-profile:active {
            transform: translateY(2px);
        }

        /* Card hasil profil */
        .profile-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.8rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease-out;
            transition: all 0.2s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header profil: avatar + nama utama */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 1.2rem;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 8px 14px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .profile-header h3 {
            font-size: 1.8rem;
            color: #2d3748;
            margin-bottom: 0.25rem;
        }

        .profile-header .job-title {
            color: #718096;
            font-weight: 500;
            background: #edf2f7;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        /* Detail info */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .info-icon {
            width: 36px;
            font-size: 1.3rem;
            text-align: center;
        }

        .info-label {
            font-weight: 600;
            color: #4a5568;
            min-width: 85px;
        }

        .info-value {
            color: #2d3748;
            word-break: break-word;
            flex: 1;
        }

        .bio {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 0.8rem;
            font-style: italic;
            color: #2c5282;
            border-left: 4px solid #667eea;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: white;
            border-radius: 1.5rem;
            gap: 0.8rem;
            font-size: 1rem;
            color: #667eea;
            font-weight: 500;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fff5f5;
            color: #c53030;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            border-left: 5px solid #e53e3e;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ Profil Saya ✨</h2>
    <button id="btnProfil" class="btn-profile">📇 Tampilkan Profil</button>
    <div id="hasil-profil"></div>
    <footer>Data diambil secara real-time dengan AJAX</footer>
</div>

<script>
    const btn = document.getElementById("btnProfil");
    const hasilDiv = document.getElementById("hasil-profil");

    // Fungsi untuk menampilkan loading
    function showLoading() {
        hasilDiv.innerHTML = `
            <div class="loading-spinner">
                <div class="spinner"></div>
                <span>Memuat data profil...</span>
            </div>
        `;
    }

    // Fungsi untuk menampilkan error
    function showError(message) {
        hasilDiv.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
    }

    // Fungsi untuk membuat tampilan profil dari data JSON
    function renderProfile(data) {
        // Ambil inisial nama (huruf pertama)
        const initial = data.nama ? data.nama.charAt(0).toUpperCase() : '?';
        // Format bio jika tidak ada
        const bioText = data.bio || "Tidak ada deskripsi singkat.";

        const profileHTML = `
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar">${initial}</div>
                    <div>
                        <h3>${escapeHtml(data.nama)}</h3>
                        <span class="job-title">${escapeHtml(data.pekerjaan)}</span>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-icon">📍</div>
                        <div class="info-label">Lokasi</div>
                        <div class="info-value">${escapeHtml(data.lokasi)}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📧</div>
                        <div class="info-label">Email</div>
                        <div class="info-value">${escapeHtml(data.email || 'tidak tersedia')}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">💼</div>
                        <div class="info-label">Pekerjaan</div>
                        <div class="info-value">${escapeHtml(data.pekerjaan)}</div>
                    </div>
                </div>
                <div class="bio">
                    📝 ${escapeHtml(bioText)}
                </div>
            </div>
        `;
        hasilDiv.innerHTML = profileHTML;
    }

    // Helper sederhana untuk mencegah XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Event klik tombol
    btn.addEventListener("click", function() {
        showLoading();

        fetch("data.php")
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // Validasi data minimal
                if (data && data.nama) {
                    renderProfile(data);
                } else {
                    throw new Error("Format data tidak valid dari server.");
                }
            })
            .catch(error => {
                console.error("Fetch error:", error);
                showError("Gagal memuat profil. Periksa koneksi atau server. " + error.message);
            });
    });
</script>

</body>
</html>
