<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profil | Ajax System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --bg-body: #f8fafc;
            --primary: #059669; /* Emerald 600 */
            --primary-hover: #047857;
            --accent: #f59e0b; /* Amber 500 */
            --text-dark: #0f172a;
            --text-light: #64748b;
            --card-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .main-container {
            background: var(--card-white);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            text-align: center;
        }

        .header-section {
            margin-bottom: 32px;
        }

        .badge {
            background: #ecfdf5;
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .desc {
            font-size: 0.95rem;
            color: var(--text-light);
            line-height: 1.6;
        }

        #btn-profil {
            width: 100%;
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        #btn-profil:hover {
            background: var(--primary);
            transform: scale(1.02);
        }

        #btn-profil:active {
            transform: scale(0.98);
        }

        /* Container Hasil */
        #hasil-profil {
            margin-top: 24px;
        }

        .profil-card {
            background: #fdfdfd;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            padding: 24px;
            text-align: left;
            animation: fadeInScale 0.4s ease-out;
        }

        .info-group {
            margin-bottom: 16px;
        }

        .info-group:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .value span.icon {
            color: var(--primary);
            font-size: 1.2rem;
        }

        /* States */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text-light);
            font-weight: 500;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .error-msg {
            background: #fff1f2;
            color: #e11d48;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid #ffe4e6;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">
            <span class="badge">Modul 10 - Web Dev</span>
            <h1>Data Explorer</h1>
            <p class="desc">Klik tombol di bawah untuk menarik data profil secara asinkron dari server.</p>
        </div>

        <button id="btn-profil">
            🔍 <span>Ambil Data Terbaru</span>
        </button>

        <div id="hasil-profil">
            </div>
    </div>

    <script>
        document.getElementById('btn-profil').addEventListener('click', function () {
            const container = document.getElementById('hasil-profil');

            // Tampilan Loading
            container.innerHTML = `
                <div class="loading-state">
                    <div class="loader"></div>
                    <p>Sinkronisasi server...</p>
                </div>
            `;

            fetch('data.php')
                .then(response => {
                    if (!response.ok) throw new Error('Koneksi terputus (' + response.status + ')');
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = `
                        <div class="profil-card">
                            <div class="info-group">
                                <p class="label">Identitas Lengkap</p>
                                <div class="value"><span class="icon">👤</span> ${data.nama}</div>
                            </div>
                            <div class="info-group">
                                <p class="label">Profesi & Bidang</p>
                                <div class="value"><span class="icon">🏢</span> ${data.pekerjaan}</div>
                            </div>
                            <div class="info-group">
                                <p class="label">Domisili Saat Ini</p>
                                <div class="value"><span class="icon">📍</span> ${data.lokasi}</div>
                            </div>
                        </div>
                    `;
                })
                .catch(error => {
                    container.innerHTML = `
                        <div class="error-msg">
                            <strong>Oops!</strong> ${error.message}
                        </div>
                    `;
                });
        });
    </script>

</body>
</html>
