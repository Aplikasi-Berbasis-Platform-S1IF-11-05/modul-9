<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tugas Modul 9 – AJAX</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* CSS Variables */
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --border:    #252a36;
      --accent:    #4fffb0;
      --accent2:   #ff6b6b;
      --text:      #e8eaf2;
      --muted:     #6b7280;
      --card-glow: rgba(79, 255, 176, 0.08);
    }

    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .35;
      pointer-events: none;
    }

    /* Container */
    .container {
      position: relative;
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    /* Tag kecil di atas */
    .tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 99px;
      padding: .25rem .75rem;
      margin-bottom: 1.25rem;
      opacity: .85;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: .5rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 2.5rem;
      font-family: 'DM Mono', monospace;
    }

    /* Tombol */
    #btn-ambil {
      position: relative;
      background: var(--accent);
      color: #0d0f14;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .04em;
      border: none;
      border-radius: 8px;
      padding: .85rem 2.4rem;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 24px rgba(79,255,176,.3);
    }

    #btn-ambil:hover  { transform: translateY(-2px); box-shadow: 0 0 36px rgba(79,255,176,.5); }
    #btn-ambil:active { transform: translateY(0);    box-shadow: 0 0 16px rgba(79,255,176,.2); }

    #btn-ambil.loading {
      pointer-events: none;
      opacity: .7;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid #0d0f14;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }
    .loading .spinner { display: inline-block; }
    .loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Kartu Hasil */
    #hasil-profil {
      margin-top: 2rem;
      min-height: 56px;
    }

    .profil-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      box-shadow: 0 0 40px var(--card-glow);
      animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profil-card .row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .profil-card .row:last-child { border-bottom: none; }

    .profil-card .label {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      width: 90px;
      flex-shrink: 0;
    }

    .profil-card .value {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }

    .profil-card .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* Format teks satu baris yang diminta tugas */
    .profil-raw {
      margin-top: .75rem;
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      color: var(--muted);
      word-break: break-all;
    }

    /* Error state */
    .error-msg {
      background: rgba(255,107,107,.08);
      border: 1px solid var(--accent2);
      border-radius: 10px;
      padding: 1rem 1.5rem;
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: .85rem;
      animation: fadeUp .4s ease both;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .06em;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="tag">PRAKTIKUM</div>

    <h1>Modul 9 - AJAX</h1>
    
    <button id="btn-ambil">
      <span class="btn-text">Tampilkan Profil</span>
      <span class="spinner"></span>
    </button>

    <!-- Tempat menampilkan hasil -->
    <div id="hasil-profil"></div>
  </div>

  <script>
    const btn    = document.getElementById('btn-ambil');
    const output = document.getElementById('hasil-profil');

    btn.addEventListener('click', function () {
      // Tampilkan state loading
      btn.classList.add('loading');
      output.innerHTML = '';

      // AJAX dengan fetch()
      fetch('data.php')
        .then(function (response) {
          // Cek apakah respons HTTP berhasil (status 200-299)
          if (!response.ok) {
            throw new Error('HTTP error! Status: ' + response.status);
          }
          // Parse JSON dari respons
          return response.json();
        })
        .then(function (data) {
          // Tampilkan data ke dalam #hasil-profil

          // Format satu baris seperti yang diminta tugas
          const rawText =
            'Nama: ' + data.nama +
            ' | Pekerjaan: ' + data.pekerjaan +
            ' | Lokasi: ' + data.lokasi;

          // Render kartu yang lebih informatif + teks mentah di bawahnya
          output.innerHTML =
            '<div class="profil-card">' +
              '<div class="row">' +
                '<span class="dot"></span>' +
                '<span class="label">Nama</span>' +
                '<span class="value">' + data.nama + '</span>' +
              '</div>' +
              '<div class="row">' +
                '<span class="dot"></span>' +
                '<span class="label">Pekerjaan</span>' +
                '<span class="value">' + data.pekerjaan + '</span>' +
              '</div>' +
              '<div class="row">' +
                '<span class="dot"></span>' +
                '<span class="label">Lokasi</span>' +
                '<span class="value">' + data.lokasi + '</span>' +
              '</div>' +
              '<p class="profil-raw">' + rawText + '</p>' +
            '</div>';
        })
        .catch(function (error) {
          // Tampilkan pesan error jika fetch gagal
          output.innerHTML =
            '<div class="error-msg">&#9888; Gagal mengambil data: ' + error.message + '</div>';
        })
        .finally(function () {
          // Kembalikan tombol ke state normal
          btn.classList.remove('loading');
        });
    });
  </script>

</body>
</html>
