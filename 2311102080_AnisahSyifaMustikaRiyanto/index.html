<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AJAX Profil</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #99a8ec, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        width: 350px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      button {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }

      #hasil-profil {
        margin-top: 25px;
      }

      .result {
        margin-top: 15px;
        padding: 15px;
        border-radius: 12px;
        background: #f3f4f6;
        animation: fadeIn 0.4s ease-in-out;
      }

      .item {
        margin: 8px 0;
        font-size: 14px;
        color: #333;
      }

      .label {
        font-weight: bold;
        color: #764ba2;
      }

      .loading {
        margin-top: 15px;
        color: #888;
        font-style: italic;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Profil Developer</h2>

      <button onclick="ambilData()">Tampilkan Profil</button>

      <div id="hasil-profil"></div>
    </div>

    <script>
      function ambilData() {
        const hasil = document.getElementById("hasil-profil");

        // Loading dulu
        hasil.innerHTML = '<p class="loading">Loading...</p>';

        fetch("data.php")
          .then((response) => response.json())
          .then((data) => {
            hasil.innerHTML = `
                <div class="result">
                    <div class="item"><span class="label">Nama:</span> ${data.nama}</div>
                    <div class="item"><span class="label">Pekerjaan:</span> ${data.pekerjaan}</div>
                    <div class="item"><span class="label">Lokasi:</span> ${data.lokasi}</div>
                </div>
            `;
          })
          .catch(() => {
            hasil.innerHTML = '<p class="loading">Gagal mengambil data 😢</p>';
          });
      }
    </script>
  </body>
</html>
