<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>📡 Data Profil CV Arsya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Glass effect container */
.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
    width: 90%;
    max-width: 900px;
}

/* Title */
h1 {
    color: white;
    margin-bottom: 25px;
    font-weight: 600;
}

/* Button */
button {
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff5e78;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* Card container */
#hasil-profil {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
}

/* Card */
.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-align: left;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* Card text */
.card h3 {
    color: #ff5e78;
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    margin-bottom: 5px;
}

/* Badge */
.badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 20px;
    background: #ffe0e6;
    color: #ff5e78;
    font-size: 12px;
    margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h1>📡 Data Profil CV Arsya</h1>

    <button onclick="loadData()">Tampilkan Profil</button>

    <div id="hasil-profil"></div>
</div>

<script>
function loadData() {
    fetch('data.php')
        .then(response => response.json())
        .then(data => {

            let output = '';

            data.forEach(item => {
                output += `
                    <div class="card">
                        <h3>${item.nama}</h3>
                        <p><strong>Pekerjaan:</strong> ${item.pekerjaan}</p>
                        <p><strong>Lokasi:</strong> ${item.lokasi}</p>
                        <span class="badge">Professional Profile</span>
                    </div>
                `;
            });

            document.getElementById('hasil-profil').innerHTML = output;
        })
        .catch(error => {
            alert("Gagal mengambil data 😭");
            console.log(error);
        });
}
</script>

</body>
</html>
