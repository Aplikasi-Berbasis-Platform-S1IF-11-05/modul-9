<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil User</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        #hasil-profil {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f5f7ff;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .item {
            margin: 5px 0;
            font-size: 14px;
            color: #444;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Profil User</h2>

        <button id="btnProfil">Tampilkan Profil</button>

        <div id="hasil-profil"></div>
    </div>

    <script>
        document.getElementById("btnProfil").addEventListener("click", function() {

            fetch("data.php")
                .then(response => response.json())
                .then(data => {

                    const hasil = document.getElementById("hasil-profil");

                    hasil.style.display = "block";
                    hasil.innerHTML = `
                        <div class="item"><b>Nama:</b> ${data.nama}</div>
                        <div class="item"><b>Pekerjaan:</b> ${data.pekerjaan}</div>
                        <div class="item"><b>Lokasi:</b> ${data.lokasi}</div>
                    `;
                })
                .catch(error => {
                    console.error(error);
                });

        });
    </script>

</body>
</html>
