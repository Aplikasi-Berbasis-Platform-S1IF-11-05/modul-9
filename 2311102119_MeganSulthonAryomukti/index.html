<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>AJAX Profil</title>
</head>

<body>

    <h2>Data Profil</h2>

    <button onclick="ambilData()">Tampilkan Profil</button>

    <div id="hasil-profil" style="margin-top: 20px;"></div>

    <script>
        function ambilData() {
            fetch('data.php')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hasil-profil').innerHTML =
                        `Nama: ${data.nama} | Pekerjaan: ${data.pekerjaan} | Lokasi: ${data.lokasi}`;
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }
    </script>

</body>

</html>
